{% extends "base.html" %}
{% block title %}Log In — Bug Tracker{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 460px;">
  <div class="text-center mb-4">
    <h1 style="font-size: 2rem;">Welcome back</h1>
    <p class="text-muted" style="font-size: 0.9rem;">
      No account yet?
      <a href="{{ url_for('signup') }}" style="color: var(--ink); font-weight: 600;">Sign up</a>
    </p>
  </div>

  <div style="background:#fff; border:1.5px solid var(--border); border-radius:16px; padding:2rem; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form method="POST" action="{{ url_for('login') }}" novalidate>

      <div class="mb-3">
        <label for="identifier" class="form-label" style="font-size:0.85rem; font-weight:600;">Username or email</label>
        <input
          type="text" id="identifier" name="identifier"
          class="form-control"
          value="{{ identifier or '' }}"
          placeholder="saeed_dev or you@example.com"
          required autocomplete="username"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <div class="mb-2">
        <label for="password" class="form-label" style="font-size:0.85rem; font-weight:600;">Password</label>
        <input
          type="password" id="password" name="password"
          class="form-control"
          placeholder="Your password"
          required autocomplete="current-password"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <div class="mb-4 d-flex align-items-center">
        <input type="checkbox" id="remember" name="remember" class="form-check-input me-2" />
        <label for="remember" class="form-check-label" style="font-size:0.85rem;">Remember me</label>
      </div>

      <button type="submit"
        style="width:100%; background:var(--ink); color:var(--cream); border:none;
               border-radius:10px; padding:0.7rem; font-weight:600; font-size:0.95rem;
               font-family:'DM Sans',sans-serif; transition:opacity 0.18s; cursor:pointer;"
        onmouseover="this.style.opacity='0.82'"
        onmouseout="this.style.opacity='1'">
        Log in
      </button>
    </form>
  </div>
</div>
{% endblock %}
