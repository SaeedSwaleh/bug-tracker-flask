{% extends "base.html" %}
{% block title %}Sign Up — Bug Tracker{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 460px;">
  <div class="text-center mb-4">
    <h1 style="font-size: 2rem;">Create account</h1>
    <p class="text-muted" style="font-size: 0.9rem;">
      Already have one?
      <a href="{{ url_for('login') }}" style="color: var(--ink); font-weight: 600;">Log in</a>
    </p>
  </div>

  <div style="background:#fff; border:1.5px solid var(--border); border-radius:16px; padding:2rem; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form method="POST" action="{{ url_for('signup') }}" novalidate>

      <div class="mb-3">
        <label for="username" class="form-label fw-600" style="font-size:0.85rem;">Username</label>
        <input
          type="text" id="username" name="username"
          class="form-control"
          value="{{ username or '' }}"
          placeholder="e.g. saeed_dev"
          minlength="3" required autocomplete="username"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label" style="font-size:0.85rem; font-weight:600;">Email</label>
        <input
          type="email" id="email" name="email"
          class="form-control"
          value="{{ email or '' }}"
          placeholder="you@example.com"
          required autocomplete="email"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label" style="font-size:0.85rem; font-weight:600;">Password</label>
        <input
          type="password" id="password" name="password"
          class="form-control"
          placeholder="At least 6 characters"
          minlength="6" required autocomplete="new-password"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <div class="mb-4">
        <label for="confirm" class="form-label" style="font-size:0.85rem; font-weight:600;">Confirm password</label>
        <input
          type="password" id="confirm" name="confirm"
          class="form-control"
          placeholder="Same password again"
          required autocomplete="new-password"
          style="border-radius:10px; border:1.5px solid var(--border); background:var(--cream);"
        />
      </div>

      <button type="submit"
        style="width:100%; background:var(--ink); color:var(--cream); border:none;
               border-radius:10px; padding:0.7rem; font-weight:600; font-size:0.95rem;
               font-family:'DM Sans',sans-serif; transition:opacity 0.18s; cursor:pointer;"
        onmouseover="this.style.opacity='0.82'"
        onmouseout="this.style.opacity='1'">
        Create account
      </button>
    </form>
  </div>
</div>
{% endblock %}
